name: Integration Test

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    integration-test:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

            - name: Run build
              run: npm run build

            - name: Run tests
              run: npm run test
