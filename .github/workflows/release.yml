name: Extension - Create GitHub Release

on:
    push:
        tags:
            - 'v*.*.*'
            - 'v*.*.*-*'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Extract and validate version
              id: version
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"

                  if [[ "$TAG" != v* ]]; then
                    echo "Invalid tag: $TAG"
                    exit 1
                  fi

                  if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Invalid version: $VERSION"
                    exit 1
                  fi

                  echo "Release: $TAG"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --silent

            - name: Update extension version
              run: |
                  npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version --silent > /dev/null
                  echo "Version: ${{ steps.version.outputs.version }}"

            - name: Build extension packages
              run: |
                  npm run zip
                  npm run zip:firefox
                  npm run zip:safari

            - name: Verify build outputs
              run: |
                  shopt -s nullglob

                  chrome_zips=(.output/*-chrome.zip)
                  firefox_zips=(.output/*-firefox.zip)
                  source_zips=(.output/*-sources.zip)
                  safari_zips=(.output/*-safari.zip)

                  if [ ${#chrome_zips[@]} -eq 0 ]; then
                    echo "Missing: Chrome/Edge zip"
                    exit 1
                  fi

                  if [ ${#firefox_zips[@]} -eq 0 ]; then
                    echo "Missing: Firefox zip"
                    exit 1
                  fi

                  if [ ${#source_zips[@]} -eq 0 ]; then
                    echo "Missing: Firefox sources zip"
                    exit 1
                  fi

                  if [ ${#safari_zips[@]} -eq 0 ]; then
                    echo "Missing: Safari zip"
                    exit 1
                  fi

                  echo "Packages ready:"
                  printf '%s\n' "${chrome_zips[@]}" "${firefox_zips[@]}" "${source_zips[@]}" "${safari_zips[@]}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  prerelease: ${{ contains(steps.version.outputs.version, '-') }}
                  files: .output/*.zip
                  fail_on_unmatched_files: true
